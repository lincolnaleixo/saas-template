# Production Docker Compose Configuration
# =======================================
#
# This file defines all services for production deployment
# Includes SSL/TLS support, monitoring, and optimized builds
#
# Services included:
# - nginx: Reverse proxy with SSL termination
# - frontend: Next.js 15 production build
# - api: Backend API production build
# - db: PostgreSQL 16 with optimized settings
# - redis: Redis 7 with persistence
# - scheduler: BullMQ worker for background jobs
# - certbot: SSL certificate management
# - monitoring: Optional monitoring stack
#
# Usage:
#   ./scripts/prod.sh
#
# All configuration comes from .env.local or .env.production


services:
  # Nginx - Reverse Proxy and SSL Termination
  nginx:
    container_name: ${PROJECT_NAME}-nginx
    image: nginx:alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # Nginx configuration
      - ./nginx/conf.d/processed/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates from Certbot
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Static files cache
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - api
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=nginx,project=${PROJECT_NAME}"
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  # Frontend - Next.js 15 Production Build
  frontend:
    container_name: ${PROJECT_NAME}-frontend
    build:
      context: ../
      dockerfile: ./infra/docker/frontend.prod.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://${DOMAIN_NAME}/api}
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=frontend,project=${PROJECT_NAME}"
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API - Backend Production Build
  api:
    container_name: ${PROJECT_NAME}-api
    build:
      context: ../
      dockerfile: ./infra/docker/api.prod.Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=${API_PORT:-8000}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@${PROJECT_NAME}-db:5432/${DB_NAME:-${PROJECT_NAME}}?sslmode=require
      - REDIS_URL=redis://${PROJECT_NAME}-redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - DOMAIN_NAME=${DOMAIN_NAME}
    expose:
      - "${API_PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=api,project=${PROJECT_NAME}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:${API_PORT:-8000}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Database - PostgreSQL 16 Production
  db:
    container_name: ${PROJECT_NAME}-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-${PROJECT_NAME}}
      - PGDATA=/var/lib/postgresql/data/pgdata
      # Performance tuning
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    volumes:
      # Persist database data
      - db_data:/var/lib/postgresql/data
      # Custom PostgreSQL configuration for production
      - ./config/postgresql.prod.conf:/etc/postgresql/postgresql.conf:ro
      # Initialization scripts
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-${PROJECT_NAME}}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=db,project=${PROJECT_NAME}"
    # Security: Don't expose ports in production
    # Access only through app network

  # Redis - Cache and Job Queue Production
  redis:
    container_name: ${PROJECT_NAME}-redis
    image: redis:7-alpine
    volumes:
      # Persist Redis data
      - redis_data:/data
      # Production Redis configuration with persistence
      - ./config/redis.prod.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=redis,project=${PROJECT_NAME}"
    command: redis-server /usr/local/etc/redis/redis.conf
    # Security: Don't expose ports in production

  # Scheduler - Background Job Worker Production
  scheduler:
    container_name: ${PROJECT_NAME}-scheduler
    build:
      context: ../
      dockerfile: ./infra/docker/scheduler.prod.Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@${PROJECT_NAME}-db:5432/${DB_NAME:-${PROJECT_NAME}}?sslmode=require
      - REDIS_URL=redis://${PROJECT_NAME}-redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=scheduler,project=${PROJECT_NAME}"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # Certbot - SSL Certificate Management
  certbot:
    container_name: ${PROJECT_NAME}-certbot
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - app-network
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=certbot,project=${PROJECT_NAME}"

  # Backup Service - Automated Database Backups
  backup:
    container_name: ${PROJECT_NAME}-backup
    build:
      context: ./docker
      dockerfile: backup.Dockerfile
    environment:
      - DB_HOST=${PROJECT_NAME}-db
      - DB_NAME=${DB_NAME:-${PROJECT_NAME}}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      - MAX_BACKUPS=${MAX_BACKUPS:-30}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=backup,project=${PROJECT_NAME}"

  # Monitoring Stack
  prometheus:
    container_name: ${PROJECT_NAME}-prometheus
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - app-network
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    container_name: ${PROJECT_NAME}-grafana
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

# Networks
networks:
  app-network:
    driver: bridge
    name: ${PROJECT_NAME}-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes
volumes:
  # Core data
  db_data:
    name: ${PROJECT_NAME}-db-data
  redis_data:
    name: ${PROJECT_NAME}-redis-data

  # Nginx
  nginx_cache:
    name: ${PROJECT_NAME}-nginx-cache

  # Monitoring (if enabled)
  prometheus_data:
    name: ${PROJECT_NAME}-prometheus-data
  grafana_data:
    name: ${PROJECT_NAME}-grafana-data
