# Development-specific Docker Compose configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      # Mount source code for hot reload
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./static:/app/static
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./worker:/app/worker
      # Persist node_modules
      - /app/node_modules
    environment:
      NODE_ENV: development
      LOG_EMOJIS: "true"
      LOG_COLORS: "true"
    command: ["bun", "run", "--hot", "backend/server.ts"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      # Mount source code for hot reload
      - ./backend:/app/backend
      - ./worker:/app/worker
      - ./scripts:/app/scripts
      - /app/node_modules
    command: ["bun", "run", "--hot", "worker/index.ts"]

  # Enable development tools
  pgadmin:
    profiles: []  # Enable by default in dev

  redis-insight:
    profiles: []  # Enable by default in dev

  maildev:
    profiles: []  # Enable by default in dev