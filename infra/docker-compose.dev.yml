services:
  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-myapp}-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-${PROJECT_NAME:-myapp}}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ../infra/database/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-myapp}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ../infra/database/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: ${PROJECT_NAME:-myapp}-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-${PROJECT_NAME:-myapp}}
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-${PROJECT_NAME:-myapp}}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PORT: ${API_PORT:-8000}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ../backend:/app/backend
      - ../package.json:/app/package.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["bun", "run", "--watch", "backend/server.ts"]

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: ${PROJECT_NAME:-myapp}-worker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-${PROJECT_NAME:-myapp}}
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-${PROJECT_NAME:-myapp}}
      REDIS_URL: redis://redis:6379
      PORT: ${WORKER_PORT:-8002}
    ports:
      - "${WORKER_PORT:-8002}:${WORKER_PORT:-8002}"
    volumes:
      - ../worker:/app/worker
      - ../backend:/app/backend
      - ../package.json:/app/package.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["bun", "run", "--watch", "worker/index.ts"]

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: ${PROJECT_NAME:-myapp}-frontend
    ports:
      - "${FRONTEND_PORT:-4001}:${FRONTEND_PORT:-4001}"
    volumes:
      - ../frontend:/app/frontend
      - ../package.json:/app/package.json
      - ../vite.config.js:/app/vite.config.js
    environment:
      - VITE_API_URL=http://localhost:${API_PORT:-8000}
      - PORT=${FRONTEND_PORT:-4001}
    command: ["bun", "run", "vite", "--", "--host", "0.0.0.0", "--port", "${FRONTEND_PORT:-4001}"]

# Development tools (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${PROJECT_NAME:-myapp}-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    profiles:
      - tools

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: ${PROJECT_NAME:-myapp}-redis-insight
    ports:
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    depends_on:
      - redis
    profiles:
      - tools

  maildev:
    image: maildev/maildev
    container_name: ${PROJECT_NAME:-myapp}-maildev
    ports:
      - "${MAILDEV_PORT:-1080}:1080"
      - "${MAILDEV_SMTP_PORT:-1025}:1025"
    profiles:
      - tools