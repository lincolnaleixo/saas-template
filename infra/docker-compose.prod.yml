version: '3.8'

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: conkero-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - conkero-network
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: conkero-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - conkero-network
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # Frontend (Vite) - Production Build
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend.prod
    container_name: conkero-frontend
    ports:
      - "4001:80"
    networks:
      - conkero-network
    restart: unless-stopped

  # API (Bun)
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: conkero-api
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - API_BASE_URL=${API_BASE_URL:-https://api.conkero.com}
    depends_on:
      - db
      - redis
    networks:
      - conkero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Scheduler (Background jobs)
  scheduler:
    build:
      context: ..
      dockerfile: infra/Dockerfile.scheduler
    container_name: conkero-scheduler
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    networks:
      - conkero-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: conkero-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-conkero}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-conkero123}
      - POSTGRES_DB=${POSTGRES_DB:-conkero}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - conkero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conkero}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: conkero-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - conkero-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backup service
  backup:
    image: postgres:15-alpine
    container_name: conkero-backup
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-conkero}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-conkero123}
      - POSTGRES_DB=${POSTGRES_DB:-conkero}
      - PGPASSWORD=${POSTGRES_PASSWORD:-conkero123}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-cron.sh:/backup-cron.sh:ro
    depends_on:
      - db
    networks:
      - conkero-network
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "echo '0 2 * * * /backup-cron.sh' | crontab - && crond -f -l 8"]

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  frontend-dist:
    driver: local
  nginx-logs:
    driver: local

networks:
  conkero-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16