# Base configuration shared between dev and prod
services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-conkero}_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-conkero}
      POSTGRES_PORT: ${DB_PORT:-5432}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-conkero}_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Service
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: ${PROJECT_NAME:-conkero}_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-8000}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-conkero}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_DIR: ${LOG_DIR:-./logger}
      LOG_MAX_SIZE: ${LOG_MAX_SIZE:-10485760}
      LOG_MAX_FILES: ${LOG_MAX_FILES:-10}
      LOG_EMOJIS: ${LOG_EMOJIS:-true}
      LOG_COLORS: ${LOG_COLORS:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Worker Service
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: ${PROJECT_NAME:-conkero}_worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WORKER_PORT:-8002}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-conkero}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
      LOG_DIR: ${LOG_DIR:-./logger}
    ports:
      - "${WORKER_PORT:-8002}:8002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
    name: ${PROJECT_NAME:-conkero}_postgres_data
  redis-data:
    name: ${PROJECT_NAME:-conkero}_redis_data

networks:
  default:
    name: ${PROJECT_NAME:-conkero}_network